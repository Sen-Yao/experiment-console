name: experiment-console-v3

services:
  console:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_REGISTRY: ${EXPERIMENT_CONSOLE_BASE_REGISTRY:-docker.m.daocloud.io/library}
        CONSOLE_UID: ${EXPERIMENT_CONSOLE_UID:-10001}
        CONSOLE_GID: ${EXPERIMENT_CONSOLE_GID:-10001}
    image: experiment-console:${EXPERIMENT_CONSOLE_IMAGE_TAG:-3}
    restart: unless-stopped
    init: true
    read_only: true
    user: "${EXPERIMENT_CONSOLE_UID:-10001}:${EXPERIMENT_CONSOLE_GID:-10001}"
    environment:
      EXPERIMENT_CONSOLE_STATE_DIR: /var/lib/experiment-console-v3
      EXPERIMENT_CONSOLE_SERVER_PROFILES: /etc/experiment-console/server-profiles.json
      EXPERIMENT_CONSOLE_INSTANCE_ID: ${EXPERIMENT_CONSOLE_INSTANCE_ID:-yggdrasil-production-v3}
      EXPERIMENT_CONSOLE_REQUIRE_API_TOKEN: "1"
      EXPERIMENT_CONSOLE_API_TOKEN_FILE: /run/secrets/console_api_token
      EXPERIMENT_CONSOLE_MONITOR_ENABLED: "1"
      EXPERIMENT_CONSOLE_MONITOR_POLL_SECONDS: ${EXPERIMENT_CONSOLE_MONITOR_POLL_SECONDS:-15}
      EXPERIMENT_CONSOLE_SSH_KEY_FILE: /run/secrets/hccs_ssh_key
      EXPERIMENT_CONSOLE_SSH_CONFIG_FILE: /run/config/ssh_config
      EXPERIMENT_CONSOLE_KNOWN_HOSTS_FILE: /run/config/known_hosts
      EXPERIMENT_CONSOLE_HEALTH_URL: http://127.0.0.1:5174/health
    ports:
      - "127.0.0.1:${EXPERIMENT_CONSOLE_PORT:-5174}:5174"
    volumes:
      - type: bind
        source: ${EXPERIMENT_CONSOLE_STATE_PATH:?set EXPERIMENT_CONSOLE_STATE_PATH}
        target: /var/lib/experiment-console-v3
      - type: bind
        source: ${EXPERIMENT_CONSOLE_SERVER_PROFILES_PATH:?set EXPERIMENT_CONSOLE_SERVER_PROFILES_PATH}
        target: /etc/experiment-console/server-profiles.json
        read_only: true
      - type: bind
        source: ${EXPERIMENT_CONSOLE_SSH_CONFIG_FILE:?set EXPERIMENT_CONSOLE_SSH_CONFIG_FILE}
        target: /run/config/ssh_config
        read_only: true
      - type: bind
        source: ${EXPERIMENT_CONSOLE_KNOWN_HOSTS_FILE:?set EXPERIMENT_CONSOLE_KNOWN_HOSTS_FILE}
        target: /run/config/known_hosts
        read_only: true
    secrets:
      - console_api_token
      - hccs_ssh_key
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,uid=${EXPERIMENT_CONSOLE_UID:-10001},gid=${EXPERIMENT_CONSOLE_GID:-10001},mode=1770
      - /home/console/.ssh:rw,noexec,nosuid,size=1m,uid=${EXPERIMENT_CONSOLE_UID:-10001},gid=${EXPERIMENT_CONSOLE_GID:-10001},mode=0700
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "/usr/local/bin/experiment-console-healthcheck"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

secrets:
  console_api_token:
    file: ${EXPERIMENT_CONSOLE_API_TOKEN_SECRET_FILE:?set EXPERIMENT_CONSOLE_API_TOKEN_SECRET_FILE}
  hccs_ssh_key:
    file: ${EXPERIMENT_CONSOLE_SSH_KEY_FILE:?set EXPERIMENT_CONSOLE_SSH_KEY_FILE}
